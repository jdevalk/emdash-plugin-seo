name: Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure plugin with '...'
        2. Visit page '...'
        3. View page source
        4. See incorrect meta tag output
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include the relevant HTML output if applicable.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low (cosmetic, minor inconvenience)
        - Medium (feature partially broken)
        - High (feature completely broken)
        - Critical (data loss, security issue)
    validations:
      required: true
  - type: input
    id: emdash-version
    attributes:
      label: EmDash Version
      placeholder: e.g., 0.1.0
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      placeholder: e.g., 0.1.0
    validations:
      required: true
