name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g typescript
      - run: npx tsc --noEmit --strict --moduleResolution bundler --module esnext --target esnext --jsx react-jsx src/**/*.ts src/**/*.tsx
