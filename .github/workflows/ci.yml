name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install -g typescript
      - run: npx tsc --noEmit --strict --moduleResolution bundler --module esnext --target esnext $(find src -name '*.ts' ! -name '*.tsx')
